name: Post Proxy to Telegram

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Run script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_PROXY_CHAT_ID: ${{ secrets.TG_PROXY_CHAT_ID }}
        run: python post_proxy.py
